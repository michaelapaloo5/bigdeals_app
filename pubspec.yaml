name: bigdeals_app
description: BigDeals Ghana - Digital Services Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  flutter_staggered_animations: ^1.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.0
  fluttertoast: ^8.2.4
  pull_to_refresh: ^2.0.0
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.1
  google_fonts: ^6.1.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.3.0
  gap: ^3.0.1
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
