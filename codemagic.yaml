workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build Android APK
        script: |
          set -e

          echo "=== Downloading Flutter master ==="
          git clone --depth 1 https://github.com/flutter/flutter.git /tmp/flutter -b master
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version

          echo "=== Cleaning old build artifacts ==="
          rm -rf build android/.gradle android/build android/app/build .dart_tool
          rm -f android/local.properties

          echo "=== Regenerating project metadata ==="
          flutter create --org com.bigdeals --project-name bigdeals_app --platforms android .

          echo "=== Verify local.properties points to our Flutter ==="
          cat android/local.properties

          echo "=== Installing dependencies ==="
          flutter pub get

          echo "=== Building APK ==="
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      artifacts:
        - build/**/outputs/**/*.apk
