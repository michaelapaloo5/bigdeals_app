workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Setup Android SDK
        script: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
      - name: Clean and regenerate
        script: |
          rm -rf android/build android/app/build .dart_tool build
          flutter create --org com.bigdeals --project-name bigdeals_app --platforms android .
      - name: Install dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      artifacts:
        - build/**/outputs/**/*.apk
