workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build Android APK
        script: |
          set -e

          echo "=== Downloading Flutter master ==="
          git clone --depth 1 https://github.com/flutter/flutter.git /tmp/flutter -b master
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version

          echo "=== Cleaning old build artifacts ==="
          rm -rf build android/.gradle android/build android/app/build .dart_tool

          echo "=== Creating local.properties ==="
          printf "sdk.dir=/usr/local/share/android-sdk\nflutter.sdk=/tmp/flutter\nflutter.buildMode=debug\nflutter.versionName=1.0.0\nflutter.versionCode=1\n" > android/local.properties
          cat android/local.properties

          echo "=== Installing dependencies ==="
          flutter pub get

          echo "=== Fixing package_config.json for native assets ==="
          python3 -c "
          import json, os
          pc_path = '.dart_tool/package_config.json'
          with open(pc_path, 'r') as f:
              config = json.load(f)
          config['rootPackage'] = 'bigdeals_app'
          has_android = any('../android/' in p.get('rootUri', '') for p in config['packages'])
          if not has_android:
              config['packages'].insert(0, {
                  'name': 'bigdeals_app',
                  'rootUri': '../android/',
                  'packageUri': '../lib/',
                  'languageVersion': '3.0'
              })
          with open(pc_path, 'w') as f:
              json.dump(config, f, indent=2)
          print('package_config.json patched successfully')
          "
          cat .dart_tool/package_config.json

          echo "=== Building APK ==="
          flutter build apk --debug --android-skip-build-dependency-validation
    artifacts:
      - build/**/outputs/**/*.apk
