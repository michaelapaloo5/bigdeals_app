workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build Android APK
        script: |
          set -ex

          echo "=== Downloading Flutter master ==="
          git clone --depth 1 https://github.com/flutter/flutter.git /tmp/flutter -b master
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version

          echo "=== Cleaning old build artifacts ==="
          rm -rf build android/.gradle android/build android/app/build .dart_tool

          echo "=== Creating local.properties ==="
          printf "sdk.dir=/usr/local/share/android-sdk\nflutter.sdk=/tmp/flutter\nflutter.buildMode=debug\nflutter.versionName=1.0.0\nflutter.versionCode=1\n" > android/local.properties
          cat android/local.properties

          echo "=== Installing dependencies ==="
          flutter pub get

          echo "=== Patching package_config.json ==="
          python3 -c "
          import json
          with open('.dart_tool/package_config.json', 'r') as f:
              config = json.load(f)
          config['rootPackage'] = 'bigdeals_app'
          for pkg in config['packages']:
              if pkg['name'] == 'bigdeals_app':
                  pkg['rootUri'] = '../android/'
                  pkg['packageUri'] = '../lib/'
                  break
          with open('.dart_tool/package_config.json', 'w') as f:
              json.dump(config, f, indent=2)
          "
          echo "Patched package_config.json:"
          python3 -c "
          import json
          with open('.dart_tool/package_config.json', 'r') as f:
              config = json.load(f)
          for p in config['packages']:
              if p['name'] == 'bigdeals_app':
                  print(json.dumps(p, indent=2))
          "

          echo "=== Building APK ==="
          flutter build apk --debug --no-pub --android-skip-build-dependency-validation
    artifacts:
      - build/**/outputs/**/*.apk
