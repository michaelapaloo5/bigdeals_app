workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Flutter 3.32.0
        script: |
          git clone --depth 1 --branch 3.32.0 https://github.com/flutter/flutter.git /tmp/flutter
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version
      - name: Setup Android SDK
        script: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
      - name: Generate project metadata
        script: |
          export PATH="/tmp/flutter/bin:$PATH"
          flutter create --org com.bigdeals --project-name bigdeals_app --platforms android .
      - name: Install dependencies
        script: |
          export PATH="/tmp/flutter/bin:$PATH"
          flutter pub get
      - name: Build APK
        script: |
          export PATH="/tmp/flutter/bin:$PATH"
          flutter build apk --debug
    artifacts:
      - build/**/outputs/**/*.apk
    publishing:
      artifacts:
        - build/**/outputs/**/*.apk
