workflows:
  android-build:
    name: Android Build
    max_build_duration: 60
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Build Android APK
        script: |
          set -e

          echo "=== Downloading Flutter master ==="
          git clone --depth 1 https://github.com/flutter/flutter.git /tmp/flutter -b master
          export PATH="/tmp/flutter/bin:$PATH"
          flutter --version

          echo "=== Cleaning old build artifacts ==="
          rm -rf build android/.gradle android/build android/app/build .dart_tool

          echo "=== Creating local.properties ==="
          cat > android/local.properties << 'EOF'
          sdk.dir=/usr/local/share/android-sdk
          flutter.sdk=/tmp/flutter
          flutter.buildMode=debug
          flutter.versionName=1.0.0
          flutter.versionCode=1
          EOF

          echo "=== Installing dependencies ==="
          flutter pub get

          echo "=== Dump package_config.json ==="
          cat .dart_tool/package_config.json

          echo "=== Fix package_config.json with python3 ==="
          python3 -c "
          import json, os
          path = '.dart_tool/package_config.json'
          with open(path) as f:
              data = json.load(f)
          fixed = False
          if 'rootPackage' not in data:
              data['rootPackage'] = 'bigdeals_app'
              fixed = True
          for p in data.get('packages', []):
              if p['name'] == 'bigdeals_app':
                  if p.get('rootUri') != '../':
                      p['rootUri'] = '../'
                      fixed = True
                  if 'packageUri' not in p:
                      p['packageUri'] = 'lib/'
                      fixed = True
          if fixed:
              with open(path, 'w') as f:
                  json.dump(data, f, indent=2)
              print('FIXED package_config.json')
          else:
              print('package_config.json is OK')
          "

          echo "=== Dump package_config.json after fix ==="
          cat .dart_tool/package_config.json

          echo "=== Building APK ==="
          flutter build apk --debug --android-skip-build-dependency-validation
    artifacts:
      - build/**/outputs/**/*.apk
